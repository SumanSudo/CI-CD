# Alternative Deployment Options (Choose one based on your preference)
# This file shows different ways to deploy WITHOUT a VPS

# Option 1: Deploy to Railway.app (FREE tier available)
name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: gregorygaines/deploy-to-railway@v1
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          # Alternative: Use this if using Railway CLI
          # run: |
          #   npm install -g @railway/cli
          #   railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          #   railway up

---

# Option 2: Deploy to Render (FREE tier available)
name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }} -X POST

---

# Option 3: Deploy Docker to Docker Hub and update docker-compose
name: Deploy with Docker Compose

on:
  push:
    branches:
      - main

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ci-cd:latest

      - name: Create deployment notification
        run: echo "Docker image pushed! Pull with: docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd:latest"

---

# Option 4: Deploy to AWS (Lambda, ECS, or AppRunner)
# Requires AWS credentials configured in GitHub Secrets
name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster my-cluster \
            --service my-service \
            --force-new-deployment
